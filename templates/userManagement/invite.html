{% extends "base.html" %}

{% block title %}Inviter un utilisateur{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Envoyer une invitation</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color:#dc3545; font-size:0.875rem; margin-top:0.25rem;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Envoyer l'invitation</button>
            <a href="{% url 'userManagement:user_list' %}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
