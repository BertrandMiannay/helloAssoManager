{% extends "base.html" %}

{% block content %}
<div style="display:flex; gap:0; margin-bottom:2rem; border-bottom:2px solid #1a1a2e;">
    <a href="{% url 'inscriptions' %}"
       style="padding:0.5rem 1.25rem; text-decoration:none; font-size:0.95rem;
              {% if active_tab == 'sorties' %}background:#1a1a2e; color:white;{% else %}color:#1a1a2e;{% endif %}">
        Sorties
    </a>
    <a href="{% url 'inscriptions-membres' %}"
       style="padding:0.5rem 1.25rem; text-decoration:none; font-size:0.95rem;
              {% if active_tab == 'membres' %}background:#1a1a2e; color:white;{% else %}color:#1a1a2e;{% endif %}">
        Membres
    </a>
</div>

{% block inscriptions_content %}{% endblock %}
{% endblock %}
